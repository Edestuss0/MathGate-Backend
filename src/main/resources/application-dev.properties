spring.application.name=mathgate
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASS}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

spring.datasource.driver-class-name=org.postgresql.Driver
spring.config.import=optional:file:.env[.properties]
server.compression.enabled=true
server.compression.mime-types=application/json,application/xml,text/html,text/plain
server.compression.min-response-size=1024
spring.jpa.properties.hibernate.generate_statistics=true
logging.level.org.hibernate.stat=DEBUG
logging.level.org.hibernate.orm.jdbc.bind=TRACE

# Минимальное количество готовых соединений (держим прогретыми)
spring.datasource.hikari.minimum-idle=5
# Время ожидания соединения из пула (после — ConnectionTimeoutException)
spring.datasource.hikari.connection-timeout=20000
# Максимальное время жизни соединения (меньше, чем wait_timeout в PostgreSQL)
spring.datasource.hikari.max-lifetime=1800000
# Таймаут неактивного соединения до возврата в пул
spring.datasource.hikari.idle-timeout=600000
# Имя пула (видно в метриках и логах)
spring.datasource.hikari.pool-name=MathgatePool
# Автокоммит для не-транзакционных запросов
spring.datasource.hikari.auto-commit=false